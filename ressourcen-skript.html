<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ressourcen-Tracker mit Quellen</title>
  <style>
    body {
      background-color: white !important;
      color: black !important;
    }
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
      padding: 6px;
      text-align: center;
    }
    input[type=number] {
      width: 80px;
    }
    .tooltip {
      position: relative;
    }
    .tooltip .tooltiptext {
      visibility: hidden;
      width: max-content;
      background-color: #eee;
      color: #000;
      border: 1px solid #666;
      text-align: left;
      padding: 5px;
      position: absolute;
      z-index: 1;
      top: 130%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .tooltip:hover .tooltiptext {
      visibility: visible;
    }
	.left-align-tooltip .tooltiptext {
	  left: 0;
	  transform: none;
	}
	.spend-indicator {
	  color: red;
	  font-weight: bold;
	  margin-left: 4px;
	}
	.account-field {
	  display: flex;
	  align-items: center;
	  gap: 2px;
	}

	.account-field input {
	  width: 60px; /* adjust to taste */
	  text-align: right;
	}
  </style>
</head>

  function updateSpentFromSlider(type, value) {
    const newSpent = parseInt(value, 10);
    const oldSpent = spentCapacity[type];
    spentCapacity[type] = newSpent;
    updateCapacityDisplay(type);
    if (newSpent !== oldSpent) {
      logAction(`Set spent ${type} to ${newSpent}`);
      saveState();
    }

  function updateCapacityDisplay(type) {
    const valueCell = document.getElementById(`account-${type}`);
    const baseValue = parseInt(valueCell.getAttribute("data-base"), 10);
    const spent = spentCapacity[type] || 0;

    valueCell.innerHTML = spent > 0
            ? `${baseValue}<span class="spend-indicator">-${spent}</span>`
            : `${baseValue}`;

    // Update slider max and value
    const slider = document.getElementById(`slider-${type}`);
    if (slider) {
      slider.max = baseValue;
      slider.value = spent;
    }
  }

  function updateIncomeDisplay(type) {
    const sources = incomeData[type];
    let total = 0;
    let tooltipText = "";

    for (const [source, value] of Object.entries(sources)) {
      total += value;
      const translatedSource = translations[currentLang][source] || source;
      tooltipText += `${translatedSource}: ${value}<br>`;
    }

    const sources2 = costData[type];

    for (const [source2, value] of Object.entries(sources2)) {
      total += value;
      const translatedSource2 = translations[currentLang][source2] || source2;
      tooltipText += `${translatedSource2}: ${value}<br>`;
    }

    document.getElementById(`income-${type}`).textContent = total;
    document.getElementById(`tooltip-${type}`).innerHTML = tooltipText;
  }

  function updateOtherResourceDisplay(type) {
    const sources = otherResourceData[type];
    let total = 0;
    let tooltipText = "";

    for (const [source, value] of Object.entries(sources)) {
      total += value;
      const translatedSource = translations[currentLang][source] || source;
      tooltipText += `${translatedSource}: ${value}<br>`;
    }

    const cell = document.getElementById(`account-${type}`);
    flashAccountCell(type);

    cell.setAttribute("data-base", total);
    document.getElementById(`tooltip-${type}`).innerHTML = tooltipText;

    // For ground/space capacity, update display including red offset
    if (type === "ground_capacity" || type === "space_capacity") {
      updateCapacityDisplay(type);
    } else {
      cell.textContent = total;
    }

  function applyIncome() {
    const types = ["food", "money", "research", "culture"];

    roundNumber++;
    if (roundNumber > 1) {
      logAction(`End politics phase round ${roundNumber}.`);
      logAction(``);
    }
    logAction(`Start economy phase round ${roundNumber}.`);

    types.forEach(type => {
      const income = parseInt(document.getElementById(`income-${type}`).textContent, 10);
      const accountInput = document.getElementById(`account-${type}`);
      const account = parseInt(accountInput.value, 10) || 0;
      accountInput.value = account + income;

      if (income > 0) {
        logAction(`Apply ${income} income to ${type} account`);
      }
    });

    // Reset spent capacity
    spentCapacity.ground_capacity = 0;
    spentCapacity.space_capacity = 0;
    updateCapacityDisplay("ground_capacity");
    updateCapacityDisplay("space_capacity");

    saveState();
  }

  function updateIncomeFromForm() {
    const value = parseInt(document.getElementById("add-value").value, 10);
    const type = document.getElementById("resource-select").value;
    const source = document.getElementById("source-select").value;
    const kind = document.getElementById("kind-select").value;

    const isIncome = kind === "income";
    const dataset = isIncome ? incomeData : costData;
    const direction = isIncome ? 1 : -1;
    const logPrefix = isIncome ? "Income" : "Maintenance";

    if (!dataset[type][source]) {
      dataset[type][source] = 0;
    }

    dataset[type][source] += direction * value;
    updateIncomeDisplay(type);

    const action = direction === 1 ? "Added" : "Subtracted";
    logAction(`${logPrefix}: ${action} ${value} to/from ${type} from source: ${source}`);

    flashIncomeCell(type);
    saveState();
  }

  function addToOtherResources() {

    const source = document.getElementById("source-select-3").value;

    if (!otherResourceData[type][source]) {
      otherResourceData[type][source] = 0;

    otherResourceData[type][source] += value;
    logAction(`Added: ${value} to account: ${type} from source: ${source}`);

    updateOtherResourceDisplay(type);

  function updateBuildForm() {
    const mode = document.getElementById("build-mode").value;
    const categorySelect = document.getElementById("build-category");

    // Show/hide category options based on mode
    const allCategories = ["resource_building", "capacity_building", "special_building", "ground_unit", "space_unit"];
    const upgradeOnly = ["resource_building", "capacity_building"];
    allCategories.forEach(cat => {
      const opt = categorySelect.querySelector(`option[value="${cat}"]`);
      if (mode === "upgrade" && !upgradeOnly.includes(cat)) {
        opt.style.display = "none";
        if (categorySelect.value === cat) {
          categorySelect.value = "resource_building";
        }
      } else {
        opt.style.display = "";
      }
    });

    const category = categorySelect.value;
    const levelGroup = document.getElementById("build-level-group");
    const resourceTypeGroup = document.getElementById("build-resource-type-group");
    const specialGroup = document.getElementById("build-special-group");
    const groundUnitGroup = document.getElementById("build-ground-unit-group");
    const spaceUnitGroup = document.getElementById("build-space-unit-group");

    // Hide all optional groups
    levelGroup.style.display = "none";
    resourceTypeGroup.style.display = "none";
    specialGroup.style.display = "none";
    groundUnitGroup.style.display = "none";
    spaceUnitGroup.style.display = "none";

    const levelSelect = document.getElementById("build-level");

    if (category === "resource_building" || category === "capacity_building") {
      levelGroup.style.display = "";
      if (category === "resource_building") {
        resourceTypeGroup.style.display = "";
      }
      // Populate level options based on mode
      levelSelect.innerHTML = "";
      if (mode === "build") {
        [1, 2, 3].forEach(l => {
          const opt = document.createElement("option");
          opt.value = l;
          opt.textContent = "Level " + l;
          levelSelect.appendChild(opt);
        });
      } else {
        [["1to2", "1 → 2"], ["2to3", "2 → 3"]].forEach(([val, label]) => {
          const opt = document.createElement("option");
          opt.value = val;
          opt.textContent = label;
          levelSelect.appendChild(opt);
        });
      }
    } else if (category === "special_building") {
      specialGroup.style.display = "";
    } else if (category === "ground_unit") {
      groundUnitGroup.style.display = "";
    } else if (category === "space_unit") {
      spaceUnitGroup.style.display = "";
    }

    updateCostPreview();
  }

  function updateCostPreview() {
    const info = getBuildInfo();
    if (!info) {
      document.getElementById("build-cost-preview").textContent = "";
      return;
    }
    const parts = [];
    for (const [res, amount] of Object.entries(info.cost)) {
      if (amount !== 0) {
        const name = translations[currentLang][res] || res;
        parts.push(`${name}: -${amount}`);
      }
    }
    if (info.capacityCost) {
      for (const [cap, amount] of Object.entries(info.capacityCost)) {
        const name = translations[currentLang][cap] || cap;
        parts.push(`${name}: -${amount}`);
      }
    }
    const maintLabel = translations[currentLang]["maintenance"] || "Maintenance";
    if (info.maintenanceEntries) {
      for (const [res, amount] of Object.entries(info.maintenanceEntries)) {
        if (amount !== 0) {
          const name = translations[currentLang][res] || res;
          parts.push(`${maintLabel} ${name}: -${amount}`);
        }
      }
    }
    let preview = parts.length > 0 ? ("(" + parts.join(", ") + ")") : "";
    if (info.data && info.data.note) {
      const noteText = translations[currentLang][info.data.note] || info.data.note;
      preview += (preview ? " " : "") + noteText;
    }
    document.getElementById("build-cost-preview").textContent = preview;
  }

  function getBuildInfo() {
    const mode = document.getElementById("build-mode").value;
    const category = document.getElementById("build-category").value;
    const level = document.getElementById("build-level").value;
    const resourceType = document.getElementById("build-resource-type").value;

    let data, cost, capacityCost, maintenanceEntries, incomeEntries, label;

    if (category === "resource_building" || category === "capacity_building") {
      const catData = buildingData[category];
      if (mode === "build") {
        data = catData.build[parseInt(level)];
        if (!data) return null;
        cost = { ...data.cost };
        capacityCost = data.capacity ? { ...data.capacity } : {};
        maintenanceEntries = {};
        if (data.maintenance) {
          for (const [res, val] of Object.entries(data.maintenance)) {
            maintenanceEntries[res] = val;
          }
        }
        incomeEntries = {};
        if (data.income_amount && category === "resource_building") {
          incomeEntries[resourceType] = data.income_amount;
        }
        if (data.provides_capacity) {
          // capacity buildings provide extra capacity
        }
        label = `${translations[currentLang][category] || category} Level ${level} (${translations[currentLang][resourceType] || resourceType})`;
      } else {
        data = catData.upgrade[level];
        if (!data) return null;
        cost = { ...data.cost };
        capacityCost = data.capacity_delta ? { ...data.capacity_delta } : {};
        maintenanceEntries = {};
        if (data.maintenance_delta) {
          for (const [res, val] of Object.entries(data.maintenance_delta)) {
            maintenanceEntries[res] = val;
          }
        }
        incomeEntries = {};
        if (data.income_delta && category === "resource_building") {
          incomeEntries[resourceType] = data.income_delta;
        }
        label = `${translations[currentLang][category] || category} ${level.replace("to", " → ")} (${translations[currentLang][resourceType] || resourceType})`;
      }

      // Food resource buildings have no maintenance
      if (category === "resource_building" && resourceType === "food") {
        for (const res in maintenanceEntries) {
          maintenanceEntries[res] = 0;
        }
      }

      // Apply technology modifiers for resource buildings
      if (category === "resource_building") {
        if (technologies.exotischer_materialienabbau) {
          if (!incomeEntries[resourceType]) incomeEntries[resourceType] = 0;
          incomeEntries[resourceType] += 1;
        }
        if (technologies.optimierte_stadtplanung) {
          for (const res in maintenanceEntries) {
            maintenanceEntries[res] = Math.max(1, maintenanceEntries[res] - 1);
          }
        }
      }
      if (category === "capacity_building" && technologies.robotronisierung) {
        for (const res in maintenanceEntries) {
          maintenanceEntries[res] = Math.max(1, maintenanceEntries[res] - 1);
        }
      }

      return { cost, capacityCost, maintenanceEntries, incomeEntries, label, category, data, mode };

    } else if (category === "special_building") {
      const specialType = document.getElementById("build-special").value;
      data = buildingData.special[specialType];
      if (!data) return null;
      cost = { ...data.cost };
      capacityCost = data.capacity ? { ...data.capacity } : {};
      maintenanceEntries = {};
      if (data.maintenance) {
        for (const [res, val] of Object.entries(data.maintenance)) {
          maintenanceEntries[res] = val;
        }
      }
      label = translations[currentLang][specialType] || specialType;
      return { cost, capacityCost, maintenanceEntries, incomeEntries: {}, label, category, data, mode: "build" };

    } else if (category === "ground_unit") {
      const unitType = document.getElementById("build-ground-unit").value;
      data = buildingData.ground_unit[unitType];
      if (!data) return null;
      cost = { ...data.cost };
      capacityCost = data.capacity ? { ...data.capacity } : {};
      maintenanceEntries = {};
      if (data.maintenance) {
        for (const [res, val] of Object.entries(data.maintenance)) {
          maintenanceEntries[res] = val;
        }
      }
      label = translations[currentLang][unitType] || unitType;
      return { cost, capacityCost, maintenanceEntries, incomeEntries: {}, label, category, data, mode: "build" };

    } else if (category === "space_unit") {
      const unitType = document.getElementById("build-space-unit").value;
      data = buildingData.space_unit[unitType];
      if (!data) return null;
      cost = { ...data.cost };
      capacityCost = data.capacity ? { ...data.capacity } : {};
      maintenanceEntries = {};
      if (data.maintenance) {
        for (const [res, val] of Object.entries(data.maintenance)) {
          maintenanceEntries[res] = val;
        }
      }
      // Apply law: Vorrang für Reinmetall — all ships cost -1 AWE (min 1)
      if (laws.vorrang_reinmetall && cost.money) {
        cost.money = Math.max(1, cost.money - 1);
      }

      label = translations[currentLang][unitType] || unitType;
      return { cost, capacityCost, maintenanceEntries, incomeEntries: {}, label, category, data, mode: "build" };
    }

    return null;
  }

  function executeBuild() {
    const info = getBuildInfo();
    if (!info) {
      alert("Invalid selection.");
      return;
    }

    const { cost, capacityCost, maintenanceEntries, incomeEntries, label, category, data, mode } = info;

    // Validate resources
    for (const [res, amount] of Object.entries(cost)) {
      if (amount === 0) continue;
      const accountEl = document.getElementById(`account-${res}`);
      if (!accountEl) continue;
      const current = parseInt(accountEl.value, 10) || 0;
      if (current < amount) {
        const resName = translations[currentLang][res] || res;
        alert(`${translations[currentLang]["not_enough_resources"] || "Not enough resources"}: ${resName} (${current} < ${amount})`);
        return;
      }
    }

    // Validate capacity
    for (const [capType, amount] of Object.entries(capacityCost)) {
      const baseEl = document.getElementById(`account-${capType}`);
      if (!baseEl) continue;
      const base = parseInt(baseEl.getAttribute("data-base"), 10) || 0;
      const spent = spentCapacity[capType] || 0;
      const available = base - spent;
      if (available < amount) {
        const capName = translations[currentLang][capType] || capType;
        alert(`${translations[currentLang]["not_enough_capacity"] || "Not enough capacity"}: ${capName} (${available} < ${amount})`);
        return;
      }
    }

    // Deduct resource costs from accounts
    for (const [res, amount] of Object.entries(cost)) {
      if (amount === 0) continue;
      const accountEl = document.getElementById(`account-${res}`);
      if (!accountEl) continue;
      const current = parseInt(accountEl.value, 10) || 0;
      accountEl.value = current - amount;
    }

    // Deduct capacity (increment spent)
    for (const [capType, amount] of Object.entries(capacityCost)) {
      spentCapacity[capType] = (spentCapacity[capType] || 0) + amount;
      updateCapacityDisplay(capType);
    }

    // Add maintenance to costData
    const maintenanceSource = (category === "ground_unit" || category === "space_unit") ? "units" : "buildings";
    for (const [res, amount] of Object.entries(maintenanceEntries)) {
      if (!costData[res]) costData[res] = {};
      if (!costData[res][maintenanceSource]) costData[res][maintenanceSource] = 0;
      costData[res][maintenanceSource] -= amount; // costData is negative for maintenance
      updateIncomeDisplay(res);
    }

    // Add income to incomeData
    for (const [res, amount] of Object.entries(incomeEntries)) {
      if (!incomeData[res]) incomeData[res] = {};
      if (!incomeData[res].buildings) incomeData[res].buildings = 0;
      incomeData[res].buildings += amount;
      updateIncomeDisplay(res);
    }

    // Buildings/units that provide additional capacity
    if (data.provides_capacity) {
      for (const [capType, amount] of Object.entries(data.provides_capacity)) {
        if (!otherResourceData[capType]) otherResourceData[capType] = {};
        if (!otherResourceData[capType].buildings) otherResourceData[capType].buildings = 0;
        otherResourceData[capType].buildings += amount;
        updateOtherResourceDisplay(capType);
      }
    }
    if (data.capacity_provides_delta) {
      for (const [capType, amount] of Object.entries(data.capacity_provides_delta)) {
        if (!otherResourceData[capType]) otherResourceData[capType] = {};
        if (!otherResourceData[capType].buildings) otherResourceData[capType].buildings = 0;
        otherResourceData[capType].buildings += amount;
        updateOtherResourceDisplay(capType);
      }
    }

    // Log the action
    const modeLabel = translations[currentLang][mode] || mode;
    logAction(`${modeLabel}: ${label}`);

    saveState();
  }

    document.querySelectorAll("[data-i18n]").forEach(el => {
      const key = el.getAttribute("data-i18n");
      el.textContent = translations[currentLang][key] || key;
    });

    ["food", "money", "research", "culture"].forEach(type => {
      updateIncomeDisplay(type);
    });

    ["empire_size", "votes", "ground_capacity", "space_capacity", "victory_points"].forEach(type => {
      updateOtherResourceDisplay(type);
    });

    if (document.getElementById("build-form")) {
